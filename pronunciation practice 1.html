<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronunciation Practice 1</title>
<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #fff; }
.pp-title { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: bold; margin-bottom: 1.4rem; }
.pp-subtitle { font-size: 16px; font-weight: bold; margin-bottom: 1rem; color: #444; }
.pp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.col-card { border: 1px solid #c9b8c8; border-radius: 8px; overflow: hidden; background: #fff; }
.col-header { background: #f5d9ef; text-align: center; padding: 8px 0; font-size: 18px; font-style: italic; font-weight: bold; color: #72243E; }
.word-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
.word-row:last-child { border-bottom: none; }
.word-text { font-size: 14px; color: #333; flex-grow: 1; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px 6px; border-radius: 4px; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
.icon-btn:hover { background: #f0f0f0; }
.status-bar { margin-top: 25px; padding: 15px; border-radius: 8px; font-size: 15px; min-height: 40px; background: #f8f9fa; border: 1px solid #ddd; text-align: center; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
.success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
.error { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
.recording { background: #fff3cd; border-color: #ffeeba; color: #856404; animation: pulse 1.5s infinite; }
.rec-label { font-size: 9px; font-weight: 900; background: #ef4444; color: white; padding: 2px 5px; border-radius: 3px; vertical-align: middle; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

@media (max-width: 768px) {
.pp-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="pp-title">
<span>🗣️</span> Pronunciation Practice 1
</div>

<div class="pp-subtitle">The Five Vowels</div>

<div id="vowel-grid" class="pp-grid"></div>

<div id="status" class="status-bar">
<div id="status-text">Select a microphone icon to start recording</div>
</div>

<script>
const vowels = ['a', 'e', 'i', 'o', 'u'];
const data = {
a: ['bag', 'bat', 'cat', 'cash', 'rash', 'rack'],
e: ['red', 'bed', 'bet', 'wet', 'when', 'then'],
i: ['big', 'bit', 'bin', 'tin', 'win', 'wink'],
o: ['bog', 'hog', 'hot', 'not', 'tot', 'top'],
u: ['bug', 'mug', 'mum', 'rum', 'run', 'bun']
};

const synth = window.speechSynthesis;
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = null;
let currentBtn = null;
let finalTranscripts = [];

if (SpeechRec) {
recognition = new SpeechRec();
recognition.lang = 'en-US';
recognition.interimResults = true;
recognition.maxAlternatives = 10;

recognition.onresult = (event) => {
let interimText = "";
finalTranscripts = [];

for (let i = event.resultIndex; i < event.results.length; ++i) {
if (event.results[i].isFinal) {
for (let j = 0; j < event.results[i].length; j++) {
finalTranscripts.push(event.results[i][j].transcript.toLowerCase().trim());
}
} else {
interimText = event.results[i][0].transcript.toLowerCase().trim();
}
}

const liveDisplay = (finalTranscripts.length > 0 ? finalTranscripts[0] : interimText);
if (liveDisplay) {
setStatus(`Hearing: "${liveDisplay}" ...`, 'recording');
}
};

recognition.onerror = (event) => {
if (event.error === 'no-speech') {
setStatus("Nothing heard. Speak clearly and close to the mic.", 'error');
} else {
setStatus("Error: " + event.error, 'error');
}
stopVisuals();
};

recognition.onend = () => {
processResult();
stopVisuals();
};
}

function processResult() {
if (!recognition.targetWord) return;
if (finalTranscripts.length === 0) return;

const target = recognition.targetWord.toLowerCase().trim();

// Checks if the exact word is in the list of alternatives
const isCorrect = finalTranscripts.some(guess => {
// Split guess into words to handle multi-word results from browser
const words = guess.split(/\s+/);
return words.includes(target);
});

if (isCorrect) {
setStatus(`Perfect! I heard: "${target}"`, 'success');
} else {
setStatus(`I heard: "${finalTranscripts[0]}". Try to say "${target}" again.`, 'error');
}
}

function stopVisuals() {
if (currentBtn) {
currentBtn.classList.remove('recording');
const label = currentBtn.querySelector('.rec-label');
if (label) label.remove();
currentBtn.querySelector('.mic-icon').style.display = 'inline';
}
}

function speak(txt) {
if (synth.speaking) synth.cancel();
const u = new SpeechSynthesisUtterance(txt);
u.lang = 'en-US';
u.rate = 0.85;
synth.speak(u);
}

function startRec(word, btn) {
if (!recognition) {
setStatus("Speech recognition not supported in this browser.", "error");
return;
}

if (currentBtn === btn && btn.classList.contains('recording')) {
recognition.stop();
return;
}

stopVisuals();
finalTranscripts = [];
recognition.targetWord = word;
currentBtn = btn;

try {
recognition.start();
setStatus(`Speak now: "${word}"`, 'recording');
btn.classList.add('recording');
btn.querySelector('.mic-icon').style.display = 'none';
const label = document.createElement('span');
label.className = 'rec-label';
label.textContent = 'STOP';
btn.appendChild(label);
} catch(e) {
recognition.stop();
}
}

function setStatus(msg, cls) {
const el = document.getElementById('status-text');
const parent = document.getElementById('status');
el.textContent = msg;
parent.className = 'status-bar' + (cls ? ' ' + cls : '');
}

function buildGrid() {
const grid = document.getElementById('vowel-grid');
grid.innerHTML = '';
vowels.forEach(v => {
const col = document.createElement('div');
col.className = 'col-card';
const hdr = document.createElement('div');
hdr.className = 'col-header';
hdr.textContent = v.toUpperCase();
col.appendChild(hdr);

data[v].forEach(word => {
const row = document.createElement('div');
row.className = 'word-row';

const span = document.createElement('span');
span.className = 'word-text';
span.textContent = word;

const speakBtn = document.createElement('button');
speakBtn.className = 'icon-btn';
speakBtn.innerHTML = '🔊';
speakBtn.onclick = () => speak(word);

const recBtn = document.createElement('button');
recBtn.className = 'icon-btn';
recBtn.innerHTML = '<span class="mic-icon">🎤</span>';
recBtn.onclick = () => startRec(word, recBtn);

row.appendChild(span);
row.appendChild(speakBtn);
row.appendChild(recBtn);
col.appendChild(row);
});
grid.appendChild(col);
});
}

buildGrid();
</script>

</body>
</html>
